# Rihla-AI — Docker Compose
# PostgreSQL est installé en local (pas dans Docker)

services:
  # ── n8n : Orchestrateur de workflows ──
  n8n:
    image: n8nio/n8n:latest
    container_name: rihla-n8n
    restart: unless-stopped
    ports:
      - "5679:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_PORT=5678
      - GENERIC_TIMEZONE=Africa/Tunis
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=host.docker.internal
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=rihla_ai
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=postgres
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── WAHA : Gateway WhatsApp ──
  waha:
    image: devlikeapro/waha:latest
    container_name: rihla-waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_DEFAULT_ENGINE=WEBJS
      - WAHA_PRINT_QR=true
      - WHATSAPP_API_HOSTNAME=0.0.0.0
      - HOST=0.0.0.0
      - WAHA_API_KEY=68ff5d3b477a4741bd5dbf5345591c21
      - WAHA_DASHBOARD_USERNAME=admin
      - WAHA_DASHBOARD_PASSWORD=rihla_admin_2026
    volumes:
      - waha_data:/app/.waha

  # ── Redis : Cache & Sessions ──
  redis:
    image: redis:7-alpine
    container_name: rihla-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── Mailhog : Email local (dev) ──
  mailhog:
    image: mailhog/mailhog:latest
    container_name: rihla-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  n8n_data:
  waha_data:
  redis_data:
